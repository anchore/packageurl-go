name: test
on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        go-version: [1.21.x, 1.22.x, 1.23.x]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:

      - name: Install Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download test data
        run: curl -L https://raw.githubusercontent.com/package-url/purl-spec/1951d217bde29590a73f075db4ab71cc00011459/test-suite-data.json -o testdata/test-suite-data.json

      - name: Test go fmt
        run: test -z $(go fmt ./...)

      - name: Golangci-lint
        uses: golangci/golangci-lint-action@5c56cd6c9dc07901af25baab6f2b0d9f3b7c3018 # v2.5.2
        with:
          only-new-issues: true

      - name: Test coverage
        run: go test -covermode atomic -coverprofile='profile.cov' ./...

# this is only available from the upstream repo
#      - name: Send coverage
#        if: runner.os == 'Linux'
#        env:
#          COVERALLS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
#        run: |
#          go install github.com/mattn/goveralls@latest
#          $(go env GOPATH)/bin/goveralls -coverprofile=profile.cov -service=github

      - name: Fuzz tests
        run: make fuzz
