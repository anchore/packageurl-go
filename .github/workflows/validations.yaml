name: "Validations"
on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:

  Static-Analysis:
    # Note: changing this job name requires making the same update in the .github/workflows/release.yaml pipeline
    name: "Static analysis"
    runs-on: ubuntu-24.04
    steps:
      # setup checkout, go, go-make, binny, and cache go modules
      - uses: anchore/go-make/.github/actions/setup@383ef7852b8ae43a30f424896b52479186d2ea4d # v0.1.0

      - name: Run static analysis
        run: make static-analysis

  Unit-Test:
    # Note: changing this job name requires making the same update in the .github/workflows/release.yaml pipeline
    name: "Unit tests"
    runs-on: ubuntu-24.04
    steps:
      # setup checkout, go, go-make, binny, and cache go modules
      - uses: anchore/go-make/.github/actions/setup@383ef7852b8ae43a30f424896b52479186d2ea4d # v0.1.0

      - name: Download test data
        run: curl -L https://raw.githubusercontent.com/package-url/purl-spec/1951d217bde29590a73f075db4ab71cc00011459/test-suite-data.json -o testdata/test-suite-data.json

      - name: Run unit tests
        run: make unit

      - name: Fuzz tests
        run: make fuzz
